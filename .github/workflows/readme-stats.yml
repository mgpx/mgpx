name: Generate README Stats Cards 📊

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout (seu repo)
        uses: actions/checkout@v4

      - name: Checkout github-readme-stats
        uses: actions/checkout@v4
        with:
          repository: anuraghazra/github-readme-stats
          path: grs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grs/package-lock.json

      - name: Install dependencies
        working-directory: grs
        run: npm ci

      - name: Start server
        working-directory: grs
        env:
          PORT: "9000"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_SECONDS: "21600"
        run: |
          nohup npm run start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..45}; do
            if curl -fsS "http://localhost:9000/" > /dev/null; then
              echo "Server is up!"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          echo "---- server log ----"
          cat grs/server.log || true
          exit 1

      - name: Generate cards
        run: |
          mkdir -p dist
          # Top Langs (igual ao seu link antigo)
          curl -fsSL \
            "http://localhost:9000/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=tokyonight" \
            -o dist/top-langs.svg

          # (Opcional) Card principal
          curl -fsSL \
            "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight" \
            -o dist/stats.svg

      - name: Stop server
        if: always()
        run: |
          if [ -f grs/server.pid ]; then
            kill "$(cat grs/server.pid)" || true
          fi

      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
